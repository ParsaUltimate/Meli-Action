name: دانلودر یوتیوب پیشرفته

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string
      output_format:
        description: 'Format'
        required: true
        type: choice
        options:
          - mp4
          - mp3
          - best
        default: 'mp4'
      video_quality:
        description: 'Quality'
        required: false
        type: choice
        options:
          - '2160'
          - '1080'
          - '720'
          - '480'
          - 'best'
        default: '1080'
      audio_quality:
        description: 'Audio bitrate'
        required: false
        type: choice
        options:
          - '320'
          - '192'
          - '128'
        default: '192'
      concurrent_fragments:
        description: 'Parallel fragments'
        required: false
        type: choice
        options:
          - '1'
          - '4'
          - '8'
          - '16'
        default: '4'
      embed_chapters:
        description: 'Embed chapters'
        required: false
        type: boolean
        default: true
      embed_metadata:
        description: 'Embed metadata'
        required: false
        type: boolean
        default: true
      download_subtitles:
        description: 'Download subtitles'
        required: false
        type: boolean
        default: false
      output_folder:
        description: 'Output folder'
        required: false
        type: string
        default: 'downloads'
      cookies:
        description: 'Cookies (Netscape format)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg zip
          pip install -q -U yt-dlp

      - name: Download video
        run: |
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          
          mkdir -p "$OUTPUT_FOLDER"
          
          # Handle cookies
          COOKIE_FILE=""
          if [ -n "$INPUT_COOKIES" ]; then
            echo "Writing cookies from input"
            printf '%s' "$INPUT_COOKIES" > /tmp/yt_cookies.txt
            COOKIE_FILE="/tmp/yt_cookies.txt"
          elif [ -n "$SECRET_COOKIES" ]; then
            echo "Writing cookies from secret"
            printf '%s' "$SECRET_COOKIES" > /tmp/yt_cookies.txt
            COOKIE_FILE="/tmp/yt_cookies.txt"
          fi
          
          # Build command
          CMD="yt-dlp"
          CMD="$CMD --newline"
          CMD="$CMD --concurrent-fragments ${{ github.event.inputs.concurrent_fragments }}"
          
          # Format
          if [ "${{ github.event.inputs.output_format }}" = "mp3" ]; then
            CMD="$CMD -x --audio-format mp3 --audio-quality ${{ github.event.inputs.audio_quality }}K"
          elif [ "${{ github.event.inputs.output_format }}" = "best" ]; then
            CMD="$CMD -f bestvideo+bestaudio --merge-output-format mp4"
          else
            CMD="$CMD -f bestvideo[height<=${{ github.event.inputs.video_quality }}]+bestaudio/best --merge-output-format mp4"
          fi
          
          # Options
          [ "${{ github.event.inputs.embed_chapters }}" = "true" ] && CMD="$CMD --embed-chapters"
          [ "${{ github.event.inputs.embed_metadata }}" = "true" ] && CMD="$CMD --embed-thumbnail --embed-metadata"
          [ "${{ github.event.inputs.download_subtitles }}" = "true" ] && CMD="$CMD --write-subs --write-auto-subs"
          
          # Cookies
          if [ -f "$COOKIE_FILE" ]; then
            CMD="$CMD --cookies $COOKIE_FILE"
          fi
          
          # Output and URL
          CMD="$CMD -o \"$OUTPUT_FOLDER/%(title)s.%(ext)s\""
          CMD="$CMD \"$VIDEO_URL\""
          
          echo "Running: $CMD"
          eval "$CMD"
        env:
          INPUT_COOKIES: ${{ github.event.inputs.cookies }}
          SECRET_COOKIES: ${{ secrets.YT_COOKIES }}

      - name: Push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/" 2>/dev/null || true
          git commit -m "Download: ${{ github.event.inputs.video_url }}" || true
          git push || true