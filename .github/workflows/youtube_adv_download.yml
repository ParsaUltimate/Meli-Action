name: دانلودر یوتیوب پیشرفته

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string
      output_format:
        description: 'Format'
        required: true
        type: choice
        options:
          - mp4
          - mp3
          - best
        default: 'mp4'
      video_quality:
        description: 'Quality'
        required: false
        type: choice
        options:
          - '2160'
          - '1080'
          - '720'
          - '480'
          - 'best'
        default: '1080'
      audio_quality:
        description: 'Audio bitrate'
        required: false
        type: choice
        options:
          - '320'
          - '192'
          - '128'
        default: '192'
      concurrent_fragments:
        description: 'Parallel fragments'
        required: false
        type: choice
        options:
          - '1'
          - '4'
          - '8'
          - '16'
        default: '4'
      embed_chapters:
        description: 'Embed chapters'
        required: false
        type: boolean
        default: true
      embed_metadata:
        description: 'Embed metadata'
        required: false
        type: boolean
        default: true
      download_subtitles:
        description: 'Download subtitles'
        required: false
        type: boolean
        default: false
      output_folder:
        description: 'Output folder'
        required: false
        type: string
        default: 'downloads'
      cookies:
        description: 'Cookies (Netscape format)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg zip
          pip install -q -U yt-dlp

      - name: Download video
        run: |
          set -x
          
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          FORMAT_TYPE="${{ github.event.inputs.output_format }}"
          QUALITY="${{ github.event.inputs.video_quality }}"
          AUDIO_Q="${{ github.event.inputs.audio_quality }}"
          FRAGMENTS="${{ github.event.inputs.concurrent_fragments }}"
          
          mkdir -p "$OUTPUT_FOLDER"
          
          # Write cookies
          if [ -n "$INPUT_COOKIES" ]; then
            printf '%s' "$INPUT_COOKIES" > /tmp/yt_cookies.txt
          elif [ -n "$SECRET_COOKIES" ]; then
            printf '%s' "$SECRET_COOKIES" > /tmp/yt_cookies.txt
          fi
          
          # Initialize array
          declare -a cmd_array
          cmd_array=("yt-dlp")
          cmd_array+=("--newline")
          cmd_array+=("--concurrent-fragments" "$FRAGMENTS")
          
          # Format selection
          if [ "$FORMAT_TYPE" = "mp3" ]; then
            cmd_array+=("-x" "--audio-format" "mp3" "--audio-quality" "${AUDIO_Q}K")
          elif [ "$FORMAT_TYPE" = "best" ]; then
            cmd_array+=("-f" "bestvideo+bestaudio" "--merge-output-format" "mp4")
          else
            cmd_array+=("-f" "bestvideo[height<=$QUALITY]+bestaudio/best" "--merge-output-format" "mp4")
          fi
          
          # Optional flags
          if [ "${{ github.event.inputs.embed_chapters }}" = "true" ]; then
            cmd_array+=("--embed-chapters")
          fi
          
          if [ "${{ github.event.inputs.embed_metadata }}" = "true" ]; then
            cmd_array+=("--embed-thumbnail" "--embed-metadata")
          fi
          
          if [ "${{ github.event.inputs.download_subtitles }}" = "true" ]; then
            cmd_array+=("--write-subs" "--write-auto-subs")
          fi
          
          # Cookies
          if [ -f /tmp/yt_cookies.txt ]; then
            cmd_array+=("--cookies" "/tmp/yt_cookies.txt")
          fi
          
          # Output and URL
          cmd_array+=("-o" "$OUTPUT_FOLDER/%(title)s.%(ext)s")
          cmd_array+=("$VIDEO_URL")
          
          # Execute
          "${cmd_array[@]}"
        
        env:
          INPUT_COOKIES: ${{ github.event.inputs.cookies }}
          SECRET_COOKIES: ${{ secrets.YT_COOKIES }}

      - name: Push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/" 2>/dev/null || true
          git commit -m "Download video" 2>/dev/null || true
          git push 2>/dev/null || true