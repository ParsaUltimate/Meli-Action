name: 🎬 Advanced YouTube Downloader Pro

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 YouTube URL (video/playlist/channel)'
        required: true
        type: string

      output_format:
        description: '📦 Output format'
        required: true
        type: choice
        default: mp4
        options:
          - mp4
          - mkv
          - webm
          - mp3
          - m4a
          - opus
          - flac

      video_quality:
        description: '🎥 Video quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
          - best

      audio_quality:
        description: '🔊 Audio quality'
        required: false
        type: choice
        default: '192'
        options:
          - '320'
          - '256'
          - '192'
          - '128'
          - best

      video_codec:
        description: '🎞️ Preferred video codec'
        required: false
        type: choice
        default: any
        options:
          - any
          - h264
          - h265
          - vp9
          - av1

      concurrent_fragments:
        description: '⚡ Concurrent fragments'
        required: false
        type: string
        default: '8'

      output_folder:
        description: '📁 Output folder'
        required: false
        type: string
        default: downloads

      trim_start:
        description: '✂️ Trim start'
        required: false
        type: string

      trim_end:
        description: '✂️ Trim end'
        required: false
        type: string

      playlist_items:
        description: '📋 Playlist items'
        required: false
        type: string

      download_subtitles:
        description: '💬 Download subtitles'
        required: false
        type: boolean
        default: false

      subtitle_langs:
        description: '🌐 Subtitle languages'
        required: false
        type: string
        default: en

      embed_metadata:
        description: '📝 Embed metadata'
        required: false
        type: boolean
        default: true

      embed_chapters:
        description: '📑 Embed chapters'
        required: false
        type: boolean
        default: true

      sponsorblock:
        description: '🚫 SponsorBlock'
        required: false
        type: choice
        default: none
        options:
          - none
          - sponsor
          - intro
          - outro
          - selfpromo
          - interaction
          - all

      write_description:
        description: '📄 Write description'
        required: false
        type: boolean
        default: false

      max_retries:
        description: '🔄 Max retries'
        required: false
        type: string
        default: '5'

      upload_mode:
        description: '📤 Upload mode'
        required: true
        type: choice
        default: artifact
        options:
          - artifact
          - repository
          - release

      extra_args:
        description: '⚙️ Extra yt-dlp args'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            jq \
            aria2 \
            curl \
            zip \
            python3-pip

          python3 -m pip install -U "yt-dlp[default]" "bgutil-ytdlp-pot-provider==1.3.1"

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔑 Start PO Token Provider
        shell: bash
        run: |
          git clone --depth 1 --branch 1.3.1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /tmp/bgutil-ytdlp-pot-provider

          cd /tmp/bgutil-ytdlp-pot-provider/server

          npm ci
          npx tsc

          nohup node build/main.js --port 4416 > /tmp/pot.log 2>&1 &

          for _ in {1..15}; do
            if ss -ltn | grep -q ':4416 '; then
              break
            fi
            sleep 2
          done

          cat /tmp/pot.log || true
          ss -ltn | grep -q ':4416 '

      - name: 🍪 Create cookies file
        shell: bash
        run: |
          cat > /tmp/cookies.txt <<'EOF'
          ${{ secrets.YT_COOKIES }}
          EOF

          chmod 600 /tmp/cookies.txt

          echo "Cookies loaded."

      - name: 📁 Prepare output folder
        run: |
          mkdir -p "${{ github.event.inputs.output_folder }}"

      - name: ⚙️ Build yt-dlp command
        id: build
        shell: bash
        run: |
          FORMAT="${{ github.event.inputs.output_format }}"
          VIDEO_QUALITY="${{ github.event.inputs.video_quality }}"
          AUDIO_QUALITY="${{ github.event.inputs.audio_quality }}"
          VIDEO_CODEC="${{ github.event.inputs.video_codec }}"

          YT_FORMAT="best"

          if [[ "$FORMAT" == "mp4" || "$FORMAT" == "mkv" || "$FORMAT" == "webm" ]]; then

            CODEC_FILTER=""

            if [[ "$VIDEO_CODEC" == "h264" ]]; then
              CODEC_FILTER="[vcodec*=avc]"
            elif [[ "$VIDEO_CODEC" == "h265" ]]; then
              CODEC_FILTER="[vcodec*=hevc]"
            elif [[ "$VIDEO_CODEC" == "vp9" ]]; then
              CODEC_FILTER="[vcodec*=vp9]"
            elif [[ "$VIDEO_CODEC" == "av1" ]]; then
              CODEC_FILTER="[vcodec*=av01]"
            fi

            if [[ "$VIDEO_QUALITY" == "best" ]]; then
              YT_FORMAT="bestvideo${CODEC_FILTER}+bestaudio/best"
            else
              YT_FORMAT="bestvideo[height<=${VIDEO_QUALITY}]${CODEC_FILTER}+bestaudio/best[height<=${VIDEO_QUALITY}]"
            fi

          else
            YT_FORMAT="bestaudio"
          fi

          echo "yt_format=$YT_FORMAT" >> "$GITHUB_OUTPUT"

      - name: 🚀 Download media
        shell: bash
        run: |
          OUTPUT_DIR="${{ github.event.inputs.output_folder }}"
          FORMAT="${{ github.event.inputs.output_format }}"

          CMD=(
            yt-dlp
            --ignore-errors
            --continue
            --no-overwrites
            --newline
            --progress
            --concurrent-fragments "${{ github.event.inputs.concurrent_fragments }}"
            --retries "${{ github.event.inputs.max_retries }}"
            --fragment-retries "${{ github.event.inputs.max_retries }}"
            --retry-sleep fragment:5
            --sleep-requests 1
            --sleep-interval 2
            --max-sleep-interval 5
            --downloader aria2c
            --downloader-args "aria2c:-x16 -s16 -k1M"
            --cookies /tmp/cookies.txt
            --geo-bypass
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
            --extractor-args "youtube:player_client=android,web"
            --extractor-args "youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416"
            --output "${OUTPUT_DIR}/%(title)s [%(id)s].%(ext)s"
            --format "${{ steps.build.outputs.yt_format }}"
          )

          if [[ -n "${{ github.event.inputs.playlist_items }}" ]]; then
            CMD+=( --playlist-items "${{ github.event.inputs.playlist_items }}" )
          fi

          if [[ "${{ github.event.inputs.download_subtitles }}" == "true" ]]; then
            CMD+=( 
              --write-subs
              --sub-langs "${{ github.event.inputs.subtitle_langs }}"
              --embed-subs
            )
          fi

          if [[ "${{ github.event.inputs.embed_metadata }}" == "true" ]]; then
            CMD+=( 
              --embed-metadata
              --embed-thumbnail
            )
          fi

          if [[ "${{ github.event.inputs.embed_chapters }}" == "true" ]]; then
            CMD+=( --embed-chapters )
          fi

          if [[ "${{ github.event.inputs.write_description }}" == "true" ]]; then
            CMD+=( --write-description )
          fi

          if [[ "${{ github.event.inputs.sponsorblock }}" != "none" ]]; then

            if [[ "${{ github.event.inputs.sponsorblock }}" == "all" ]]; then
              CMD+=( --sponsorblock-remove all )
            else
              CMD+=( --sponsorblock-remove "${{ github.event.inputs.sponsorblock }}" )
            fi

          fi

          if [[ "$FORMAT" == "mp3" || "$FORMAT" == "m4a" || "$FORMAT" == "opus" || "$FORMAT" == "flac" ]]; then

            CMD+=(
              --extract-audio
              --audio-format "$FORMAT"
              --audio-quality "${{ github.event.inputs.audio_quality }}"
            )

          else

            CMD+=(
              --merge-output-format "$FORMAT"
            )

          fi

          if [[ -n "${{ github.event.inputs.trim_start }}" || -n "${{ github.event.inputs.trim_end }}" ]]; then

            SECTION=""

            if [[ -n "${{ github.event.inputs.trim_start }}" ]]; then
              SECTION="${{ github.event.inputs.trim_start }}"
            fi

            SECTION="${SECTION}-"

            if [[ -n "${{ github.event.inputs.trim_end }}" ]]; then
              SECTION="${SECTION}${{ github.event.inputs.trim_end }}"
            fi

            CMD+=( --download-sections "*${SECTION}" )
          fi

          if [[ -n "${{ github.event.inputs.extra_args }}" ]]; then
            EXTRA_ARGS="${{ github.event.inputs.extra_args }}"
            read -ra EXTRA <<< "$EXTRA_ARGS"
            CMD+=( "${EXTRA[@]}" )
          fi

          CMD+=( "${{ github.event.inputs.video_url }}" )

          echo "Running yt-dlp..."
          printf '%q ' "${CMD[@]}"
          echo

          if ! "${CMD[@]}"; then
            echo "Primary format request failed; retrying with fallback format 'best'."

            FALLBACK_CMD=("${CMD[@]}")

            for i in "${!FALLBACK_CMD[@]}"; do
              if [[ "${FALLBACK_CMD[$i]}" == "--format" ]]; then
                FALLBACK_CMD[$((i + 1))]="best"
                break
              fi
            done

            printf '%q ' "${FALLBACK_CMD[@]}"
            echo

            "${FALLBACK_CMD[@]}"
          fi

      - name: 📂 Show downloaded files
        run: |
          echo "Downloaded files:"
          find "${{ github.event.inputs.output_folder }}" -type f || true

      - name: 📦 Upload artifact
        if: github.event.inputs.upload_mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-media
          path: ${{ github.event.inputs.output_folder }}/**
          retention-days: 7

      - name: 📤 Push files to repository
        if: github.event.inputs.upload_mode == 'repository'
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p media

          cp -r "${{ github.event.inputs.output_folder }}/." media/ || true

          git add media

          git commit -m "Add downloaded media" || echo "No changes to commit"

          git push

      - name: 🗜️ Create release archive
        if: github.event.inputs.upload_mode == 'release'
        run: |
          cd "${{ github.event.inputs.output_folder }}"
          zip -r ../downloaded-media.zip .

      - name: 🚀 Upload GitHub Release
        if: github.event.inputs.upload_mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_number }}
          name: Download ${{ github.run_number }}
          files: downloaded-media.zip
