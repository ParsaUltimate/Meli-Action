name: دانلودر یوتیوب پیشرفته

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL (video or playlist)'
        required: true
        type: string
      output_format:
        description: 'Output format'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
          - best (auto)
        default: 'mp4 (video)'
      video_quality:
        description: 'Max video resolution to download'
        required: false
        type: choice
        options:
          - '2160 (4K)'
          - '1080 (Full HD)'
          - '720 (HD)'
          - '480'
          - '360'
          - '144'
          - 'best'
        default: '1080 (Full HD)'
      audio_quality:
        description: 'Audio bitrate — applies to MP3 downloads'
        required: false
        type: choice
        options:
          - '320'
          - '192'
          - '128'
          - '64'
        default: '192'
      video_codec:
        description: 'Preferred video codec (ignored for audio-only)'
        required: false
        type: choice
        options:
          - 'any (auto)'
          - 'h264 (MP4 compatible)'
          - 'vp9'
          - 'av1'
        default: 'any (auto)'
      concurrent_fragments:
        description: 'Parallel download fragments'
        required: false
        type: choice
        options:
          - '4'
          - '8'
          - '16'
          - '1'
        default: '4'
      sponsorblock:
        description: 'Skip sponsor / intro / outro segments via SponsorBlock'
        required: false
        type: boolean
        default: false
      embed_chapters:
        description: 'Embed chapter markers into the output file'
        required: false
        type: boolean
        default: true
      write_description:
        description: 'Save video description as a .description text file'
        required: false
        type: boolean
        default: false
      trim_start:
        description: 'Trim start timestamp (e.g. 0:33 or 1:22:10)'
        required: false
        type: string
      trim_end:
        description: 'Trim end timestamp (e.g. 1:22 or 2:00:00)'
        required: false
        type: string
      playlist_items:
        description: 'Playlist items to download (empty=single, all=full, 3-7=range, 1,3,5=specific)'
        required: false
        type: string
      cookies:
        description: 'Cookie string (Netscape format) or use YT_COOKIES secret'
        required: false
        type: string
      download_subtitles:
        description: 'Download subtitle files'
        required: false
        type: boolean
        default: false
      subtitle_langs:
        description: 'Subtitle languages, comma-separated (e.g. en,fa)'
        required: false
        type: string
        default: 'en'
      embed_metadata:
        description: 'Embed thumbnail and metadata into the output file'
        required: false
        type: boolean
        default: true
      max_part_mb:
        description: 'Maximum part size in MB for splitting (0 = no split)'
        required: false
        type: number
        default: 90
      output_folder:
        description: 'Folder to store downloads (relative to repo root)'
        required: false
        type: string
        default: 'downloads'
      extra_args:
        description: 'Extra yt-dlp arguments (advanced users)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg zip
          pip install -q -U "yt-dlp[default]" bgutil-ytdlp-pot-provider
          git clone --depth 1 --branch 1.3.1 \
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git \
            /tmp/bgutil
          cd /tmp/bgutil/server && npm ci && npx tsc

      - name: Start PO Token provider server
        run: |
          node /tmp/bgutil/server/build/main.js &
          sleep 5

      - name: Download media
        run: |
          set -e
          
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          
          echo "URL: $VIDEO_URL"
          echo "Output folder: $OUTPUT_FOLDER"
          
          mkdir -p "$OUTPUT_FOLDER"
          
          # Handle cookies
          COOKIE_FILE=""
          if [ -n "$COOKIES_INPUT" ]; then
            echo "Using cookies from input"
            printf '%s' "$COOKIES_INPUT" > /tmp/cookies.txt
            COOKIE_FILE="/tmp/cookies.txt"
          elif [ -n "$YT_COOKIES_SECRET" ]; then
            echo "Using cookies from secret"
            printf '%s' "$YT_COOKIES_SECRET" > /tmp/cookies.txt
            COOKIE_FILE="/tmp/cookies.txt"
          fi
          
          # Build quality filter
          VIDEO_QUALITY="${{ github.event.inputs.video_quality }}"
          QUALITY_NUM=$(echo "$VIDEO_QUALITY" | grep -o '[0-9]*' | head -1)
          
          # Build format args
          FORMAT_INPUT="${{ github.event.inputs.output_format }}"
          AUDIO_Q="${{ github.event.inputs.audio_quality }}"
          
          if [ "$FORMAT_INPUT" = "mp3 (audio only)" ]; then
            FORMAT="-x --audio-format mp3 --audio-quality ${AUDIO_Q}K"
          elif [ "$FORMAT_INPUT" = "best (auto)" ] || [ "$VIDEO_QUALITY" = "best" ]; then
            FORMAT="-f bestvideo+bestaudio --merge-output-format mp4"
          else
            FORMAT="-f bestvideo[height<=${QUALITY_NUM}]+bestaudio/best[height<=${QUALITY_NUM}] --merge-output-format mp4"
          fi
          
          # Build command
          CMD="yt-dlp --js-runtimes node --newline"
          CMD="$CMD --extractor-args 'youtube:player_client=web_music,web,tv'"
          CMD="$CMD --concurrent-fragments ${{ github.event.inputs.concurrent_fragments }}"
          CMD="$CMD $FORMAT"
          
          # Optional arguments
          [ "${{ github.event.inputs.embed_chapters }}" = "true" ] && CMD="$CMD --embed-chapters"
          [ "${{ github.event.inputs.sponsorblock }}" = "true" ] && CMD="$CMD --sponsorblock-remove sponsor,intro,outro,selfpromo,interaction"
          [ "${{ github.event.inputs.write_description }}" = "true" ] && CMD="$CMD --write-description"
          [ "${{ github.event.inputs.embed_metadata }}" = "true" ] && CMD="$CMD --embed-thumbnail --embed-metadata --add-metadata"
          [ "${{ github.event.inputs.download_subtitles }}" = "true" ] && CMD="$CMD --write-subs --write-auto-subs --sub-langs ${{ github.event.inputs.subtitle_langs }}"
          [ -n "${{ github.event.inputs.playlist_items }}" ] && CMD="$CMD --playlist-items ${{ github.event.inputs.playlist_items }}" || CMD="$CMD --no-playlist"
          [ -n "$COOKIE_FILE" ] && CMD="$CMD --cookies $COOKIE_FILE"
          
          # Trim support
          if [ -n "${{ github.event.inputs.trim_start }}" ] && [ -n "${{ github.event.inputs.trim_end }}" ]; then
            CMD="$CMD --download-sections '*${{ github.event.inputs.trim_start }}-${{ github.event.inputs.trim_end }}' --force-keyframes-at-cuts"
          elif [ -n "${{ github.event.inputs.trim_start }}" ]; then
            CMD="$CMD --download-sections '*${{ github.event.inputs.trim_start }}-inf' --force-keyframes-at-cuts"
          elif [ -n "${{ github.event.inputs.trim_end }}" ]; then
            CMD="$CMD --download-sections '*0-${{ github.event.inputs.trim_end }}' --force-keyframes-at-cuts"
          fi
          
          CMD="$CMD -o '$OUTPUT_FOLDER/%(title)s [%(id)s].%(ext)s'"
          [ -n "${{ github.event.inputs.extra_args }}" ] && CMD="$CMD ${{ github.event.inputs.extra_args }}"
          CMD="$CMD '$VIDEO_URL'"
          
          echo "Running: $CMD"
          eval "$CMD"
        env:
          COOKIES_INPUT: ${{ github.event.inputs.cookies }}
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}

      - name: Split oversized files (optional)
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          THRESH_MB=${{ github.event.inputs.max_part_mb }}
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

          for f in "$OUTPUT_FOLDER"/*; do
            [ -f "$f" ] || continue
            fs=$(stat -c%s "$f")
            fname=$(basename "$f")
            if [ "$THRESH_BYTES" -gt 0 ] && [ "$fs" -gt "$THRESH_BYTES" ]; then
              zip -j -s "${THRESH_MB}m" "$OUTPUT_FOLDER/${fname}.zip" "$f"
              rm "$f"
            fi
          done

      - name: Push changes to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/" || true
          git commit -m "Download media [skip ci]" || echo "Nothing to commit"
          git push || echo "Nothing to push"